<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Slow Page</title></head>
<body>
  <div id="content" style="display:none">Loaded</div>
  <script>
    setTimeout(function () {
      document.getElementById('content').style.display = 'block';
    }, 3000);
  </script>
</body>
</html>
