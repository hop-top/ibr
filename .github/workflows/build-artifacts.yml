# Build and upload dist/ artifacts — triggered on version tags or manually.
# Each platform gets its own artifact upload so release assets are separated.
name: Build Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: "build — ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        # Build on all three platforms; produces platform-native binaries.
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22.x"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Full build: bundle + SEA binary. build:bundle is a subset; use
      # the full "build" script here to produce release-ready artifacts.
      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v5
        with:
          name: dist-${{ matrix.os }}
          path: dist/
          retention-days: 30
