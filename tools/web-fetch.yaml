name: web-fetch
description: Fetch a URL and extract its content as clean text
params:
  - name: url
    description: URL to fetch
    required: true
  - name: selector
    description: CSS selector to scope extraction (optional)
    default: ""
url: "{{url}}"
instructions:
  - wait for the page to fully load
  - extract the main content as clean readable text; skip navigation, ads, and footers
